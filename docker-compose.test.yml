services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: oba_test
    ports:
      - "15432:5432"
    volumes:
      - ./tests/integration/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d oba_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  api-key-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
